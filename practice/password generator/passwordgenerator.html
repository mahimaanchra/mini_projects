<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="passwordgenerator.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=content_copy" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1 style="text-align: center;">Password Generator</h1>
<div class="Inputbox">
    <input type="text" class="passbox" id="passbox" disabled>
    <span id = "copyicon"
    class="material-icons">
content_copy
</span>
</div>
<input id="inputSlider" type="range" min="1" max="30" value="8" style="accent-color: rgb(231, 65, 176);">
  <div class="row">
<p>Password Length</p>
<span id="sliderValue">4</span>
</div>
<div class="row">
<label for="lowercase">Include Lowercase (a-z)</label>
<input type="checkbox" name="lowercase" id="lowercase"checked>
</div>
<div class="row">
<label for="uppercase">Include Uppercase (A-Z)</label>
<input type="checkbox" name="uppercase" id="uppercase"checked>
</div>
<div class="row">
<label for="numbers"> Include Numbers (0-9)</label>
<input type="checkbox" name="numbers" id="numbers"checked>
</div>
<div class="row">
<label for="symbols">Include Symbols (@#$)</label>
<input type="checkbox" name="symbols" id="symbols"checked>
</div>
<button id="genBtn" class="genBtn">Generate Password</button>
</div>  
</body>
<script src="passwordgenerator.js"></script>
</html>
