<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer using Javascript </title>
    <link rel="stylesheet" href="cd.css">
</head>
<body>
  <h1> My Birthday Countdown</h1> 
  <div class="countdown">
    <div class="timer">
        <span class="time" id="days"> 10 </span>
        <span class="label">days</span>
    </div>
    <div class="timer">
        <span class="time" id="hours"> 10 </span>
        <span class="label">hours</span>
    </div>
    <div class="timer">
        <span class="time" id="mins"> 10 </span>
        <span class="label">mins</span>
    </div>
    <div class="timer">
        <span class="time" id="secs"> 10 </span>
        <span class="label">secs</span>
    </div>
  </div> 
</body>
<script src="cd.js"></script>
</html>
