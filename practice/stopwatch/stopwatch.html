<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="stopwatch.css">
</head>
<body>
 <div class="container">
    <div class="display">
        <div class="timer">
           00:00:00

        </div>
    </div>
 </div>   
</body>
<script src="stopwatch.js"></script>
</html>
