<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation in Javascript</title>
    <link rel="stylesheet" href="f.css">
</head>
<body>
  <div class="container">
    <div class="box">
        <header class="signup-header">
            <h1>Signup</h1>
        </header>
        <main class="signup-body">
            <form action="#">
               <p>
                 <label for="name">Full Name</label>
                 <input type="text" placeholder="Type Name Here" id="name">
                 <span id="nameError"></span>
               </p>
               <p>
                 <label for="email">Email</label>
                <input type="text" placeholder="xyz@gmail.com" id="email">
                <span id="emailError"></span>
               </p>
               <p>
                 <label for="password">Password</label>
                <input type="password" placeholder="at least 8 characters" id="password">
                <span id="passwordError"></span>
               </p>
               <p>
                <input type="submit" value ="CreateAccount " id="submitBtn">
               </p>
            </form>
        </main>
        <footer class="signup-footer">
            <p>
                Already have an account <a href=""> Login</a>
            </p>
        </footer>
    </div>
  </div>  
</body>
<script src="f.js"></script>
</html>
